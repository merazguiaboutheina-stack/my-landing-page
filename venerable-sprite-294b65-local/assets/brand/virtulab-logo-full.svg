<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 190" role="img" aria-labelledby="title desc">
  <title id="title">VirtuLab - تجربتي full logo</title>
  <desc id="desc">Full scalable SVG logo for an AI science education virtual laboratory platform.</desc>
  <defs>
